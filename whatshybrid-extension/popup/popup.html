<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsHybrid Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header com Logo Animada -->
    <header class="popup-header">
      <div class="logo-container">
        <img src="../icons/48.png" alt="Logo" class="logo pulse">
        <div class="logo-glow"></div>
      </div>
      <div class="header-text">
        <h1>WhatsHybrid <span class="pro-badge">Pro</span></h1>
        <p class="version" id="version">v…</p>
      </div>
    </header>

    <!-- Status Card -->
    <div class="status-card" id="statusCard">
      <div class="status-indicator active" id="statusIndicator"></div>
      <div class="status-text">
        <span class="status-title">Status</span>
        <span class="status-value" id="statusValue">Conectado ao WhatsApp Web</span>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
      <button class="action-btn primary" id="openCRM">
        <span class="btn-icon">📊</span>
        <span class="btn-text">CRM Kanban</span>
        <span class="btn-arrow">→</span>
      </button>

      <button class="action-btn secondary" id="openPanel">
        <span class="btn-icon">🚀</span>
        <span class="btn-text">Abrir Painel</span>
      </button>

      <button class="action-btn secondary" id="openSidePanel">
        <span class="btn-icon">👥</span>
        <span class="btn-text">Extrator V6 (Side Panel)</span>
      </button>
      
      <button class="action-btn secondary" id="extractContacts">
        <span class="btn-icon">📱</span>
        <span class="btn-text">Extrair Contatos</span>
      </button>
      
      <button class="action-btn secondary" id="openRecover">
        <span class="btn-icon">🧠</span>
        <span class="btn-text">Recover</span>
      </button>

      <button class="action-btn secondary" id="openSAPL">
        <span class="btn-icon">🔰</span>
        <span class="btn-text">SAPL</span>
      </button>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📨</div>
        <div class="stat-value" id="statSent">0</div>
        <div class="stat-label">Enviadas</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏳</div>
        <div class="stat-value" id="statPending">0</div>
        <div class="stat-label">Pendentes</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-value" id="statSuccess">0</div>
        <div class="stat-label">Sucesso</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">❌</div>
        <div class="stat-value" id="statFailed">0</div>
        <div class="stat-label">Falhas</div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="popup-footer">
      <a href="#" class="footer-link" id="settingsLink">⚙️ Configurações</a>
    </footer>
  </div>
  
  <script src="../utils/logger.js"></script>
  <script src="../utils/ui-helpers.js"></script>
  <script src="popup.js"></script>
</body>
</html>
