<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WhatsHybrid — Selecionar arquivo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0b141a;
      color: #e9edef;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card { text-align: center; padding: 28px 24px; max-width: 400px; }
    h1 { font-size: 16px; font-weight: 700; margin: 0 0 8px; }
    p { font-size: 12px; opacity: .72; margin: 0 0 22px; line-height: 1.55; }
    button {
      font-size: 14px;
      font-weight: 700;
      padding: 14px 22px;
      width: 100%;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      color: #06231a;
      background: linear-gradient(180deg, #25d366, #1da851);
    }
    button:disabled { opacity: .55; cursor: default; }
    #fp_status { margin-top: 16px; font-size: 12px; min-height: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="fp_title">Selecionar arquivo</h1>
    <p>O painel lateral do Chrome não consegue abrir o seletor de arquivos.
       Use esta janela para escolher o anexo — ele volta automaticamente para o disparo.</p>
    <button id="fp_btn" type="button">Selecionar arquivo</button>
    <input id="fp_input" type="file" style="display:none" />
    <div id="fp_status"></div>
  </div>
  <script src="filepicker.js"></script>
</body>
</html>
