version: 2
updates:
  # Backend deps
  - package-ecosystem: "npm"
    directory: "/whatshybrid-backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(backend)"
      include: "scope"
    labels:
      - "dependencies"
      - "backend"
    reviewers:
      - "your-github-username"
    groups:
      production-deps:
        dependency-type: "production"
        update-types:
          - "patch"
          - "minor"
      dev-deps:
        dependency-type: "development"
        update-types:
          - "patch"
          - "minor"

  # Extension deps
  - package-ecosystem: "npm"
    directory: "/whatshybrid-extension"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(ext)"

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/whatshybrid-backend"
    schedule:
      interval: "monthly"
