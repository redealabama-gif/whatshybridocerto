<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir senha — WhatsHybrid Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/futuristic.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .auth-card { width: 100%; max-width: 440px; padding: 40px; }
    .auth-header { text-align: center; margin-bottom: 32px; }
    .input-with-icon { position: relative; }
    .input-with-icon i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-dim); width: 18px; height: 18px; }
    .input-with-icon .input { padding-left: 44px; }
    .pwd-strength { height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; margin-top: 6px; }
    .pwd-strength-bar { height: 100%; width: 0; background: var(--error); transition: width 0.3s, background 0.3s; }
    .pwd-strength-bar[data-level="weak"]   { width: 33%; background: var(--error); }
    .pwd-strength-bar[data-level="medium"] { width: 66%; background: var(--warning); }
    .pwd-strength-bar[data-level="strong"] { width: 100%; background: var(--success); }
  </style>
</head>
<body class="auth-page">

<div class="bg-grid"></div>
<div class="bg-glow purple"></div>
<div class="bg-glow cyan"></div>

<div class="auth-card glass-strong">
  <div class="auth-header">
    <a href="index.html" class="logo justify-center mb-6" style="display:inline-flex;">
      <span class="logo-mark">W</span>
      <span>WhatsHybrid <span style="color: var(--brand-cyan);">Pro</span></span>
    </a>
    <h1>Redefinir senha</h1>
    <p class="text-muted">Escolha uma nova senha forte</p>
  </div>

  <div id="invalid-token-state" class="text-center" style="display:none;" role="alert">
    <i data-lucide="alert-triangle" style="width:48px;height:48px;color:var(--error);"></i>
    <h2 style="font-size: 1.2rem; margin: 16px 0;">Link inválido ou expirado</h2>
    <p class="text-muted">Solicite um novo link em <a href="forgot-password.html">recuperar senha</a>.</p>
  </div>

  <form id="reset-form" novalidate aria-label="Formulário de redefinição de senha">
    <div class="input-group" data-field="password">
      <label class="input-label" for="password">Nova senha</label>
      <div class="input-with-icon">
        <i data-lucide="lock" aria-hidden="true"></i>
        <input type="password" id="password" class="input" placeholder="Mínimo 8 caracteres"
               required minlength="8" autocomplete="new-password" aria-required="true">
      </div>
      <div class="pwd-strength"><div class="pwd-strength-bar" id="pwd-bar"></div></div>
      <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;" id="pwd-text">Use 8+ caracteres com letras, números e símbolos</div>
      <div class="input-error-text" role="alert"></div>
    </div>

    <div class="input-group" data-field="password2">
      <label class="input-label" for="password2">Confirme a nova senha</label>
      <div class="input-with-icon">
        <i data-lucide="lock" aria-hidden="true"></i>
        <input type="password" id="password2" class="input" placeholder="Digite novamente"
               required minlength="8" autocomplete="new-password" aria-required="true">
      </div>
      <div class="input-error-text" role="alert"></div>
    </div>

    <button type="submit" class="btn btn-primary btn-block btn-large" id="submit-btn">
      <i data-lucide="check" aria-hidden="true" style="width:18px;height:18px;"></i>
      Redefinir senha
    </button>
  </form>
</div>

<script src="js/futuristic.js"></script>
<script>
  lucide.createIcons();

  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    document.getElementById('reset-form').style.display = 'none';
    document.getElementById('invalid-token-state').style.display = 'block';
    lucide.createIcons();
  }

  // Password strength
  const pwdInput = document.getElementById('password');
  const pwdBar = document.getElementById('pwd-bar');
  const pwdText = document.getElementById('pwd-text');
  pwdInput?.addEventListener('input', () => {
    const v = pwdInput.value;
    let level = '', txt = 'Use 8+ caracteres com letras, números e símbolos';
    if (v.length >= 8) {
      const score = [/[a-z]/, /[A-Z]/, /\d/, /[^a-zA-Z0-9]/].filter(r => r.test(v)).length + (v.length >= 12 ? 1 : 0);
      if (score >= 4) { level = 'strong'; txt = 'Senha forte'; }
      else if (score >= 2) { level = 'medium'; txt = 'Senha média'; }
      else { level = 'weak'; txt = 'Senha fraca'; }
    } else if (v.length > 0) { level = 'weak'; txt = `Faltam ${8 - v.length} caracteres`; }
    pwdBar.dataset.level = level;
    pwdText.textContent = txt;
  });

  document.getElementById('reset-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearFormErrors(e.target);

    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;

    if (password.length < 8) return formError(e.target, 'password', 'Mínimo 8 caracteres');
    if (password !== password2) return formError(e.target, 'password2', 'Senhas não coincidem');

    const btn = document.getElementById('submit-btn');
    setLoading(btn, true);
    try {
      await api.post('/api/v1/auth/reset-password', { token, password });
      toast('Senha redefinida! Redirecionando...', 'success');
      setTimeout(() => { window.location.href = 'login.html'; }, 1500);
    } catch (err) {
      if (err.message.toLowerCase().includes('inválid') || err.message.toLowerCase().includes('expirado')) {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('invalid-token-state').style.display = 'block';
        lucide.createIcons();
      } else {
        toast('Erro: ' + err.message, 'error');
      }
    } finally {
      setLoading(btn, false);
    }
  });
</script>

</body>
</html>
